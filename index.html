// ── CLIPBOARD ─────────────────────────────────────────────────────────
function buildSummaryText(entry){
  const e=entry||lastSessData;if(!e)return'No session data.';
  const d=new Date(e.date);const sess=SESSIONS[e.session];
  let lines=['Treningsøkt #'+(e.sessNumber||'?'),'',
    d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}),
    e.label+(e.sub?' — '+e.sub:''),
    'Duration: '+(e.duration||'—')+' min · '+e.done+'/'+e.total+' exercises'];
  if(e.checkin){lines.push('');lines.push('Check-in: '+e.checkin);}
  lines.push('');
  sess.groups.forEach(grp=>{
    lines.push(grp.title.toUpperCase());
    grp.exercises.forEach(ex=>{
      const le=e.log[ex.id];if(!le)return;
      if(ex.type==='warmup'){const mv=le.metrics||{};lines.push((le.done?'✓ ':'○ ')+ex.name+' — Setting '+(mv.setting||'?')+' · '+(mv.duration||'?')+' min · '+(mv.distance||'?')+' m');}
      else if(ex.type==='checkbox'){lines.push((le.done?'✓ ':'○ ')+ex.name);}
      else{if(le.skipped){lines.push('⊘ '+(le.displayName||ex.name)+' (skipped)');return;}
        const sets=(le.sets||[]).filter(s=>s.logged);const doneAll=(le.sets||[]).length>0&&(le.sets||[]).every(s=>s.logged);
        lines.push((doneAll?'✓ ':'○ ')+(le.displayName||ex.name));
        if(le.warmupSetDone)lines.push('  Warm-up: 20 kg × 1 set ✓');
        if(sets.length)lines.push('  '+sets.map((s,i)=>'S'+(i+1)+': '+fmtSet(s)).join(' · '));
        if(le.note)lines.push('  Note: '+le.note);}
    });lines.push('');
  });
  const customs=Object.entries(e.log).filter(([,v])=>v.isCustom);
  if(customs.length){lines.push('ADDITIONAL');customs.forEach(([,v])=>{const sets=(v.sets||[]).filter(s=>s.logged);lines.push(((v.sets||[]).every(s=>s.logged)?'✓ ':'○ ')+(v.customName||'Custom'));if(sets.length)lines.push('  '+sets.map((s,i)=>'S'+(i+1)+': '+fmtSet(s)).join(' · '));if(v.note)lines.push('  Note: '+v.note);});}
  return lines.join('\n');
}
function copySummary(entry){
  const text=buildSummaryText(entry||lastSessData);
  const btn=document.getElementById('copyBtn');
  navigator.clipboard.writeText(text).then(()=>{if(btn){btn.innerHTML='<span>✓</span> Copied';btn.classList.add('copied');}})
  .catch(()=>{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);if(btn){btn.innerHTML='<span>✓</span> Copied';btn.classList.add('copied');}});
}

// ── HISTORY ───────────────────────────────────────────────────────────
function renderHistory(){
  const c=document.getElementById('histList');
  if(!history.length){c.innerHTML='<div class="empty-state">No sessions logged yet.</div>';return;}
  c.innerHTML=history.map((h,idx)=>{
    const d=new Date(h.date);
    return '<div class="hist-entry" onclick="openHistDetail('+idx+')">'
      +'<div><div class="h-date">'+d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'}).toUpperCase()+'</div>'
      +'<div class="h-name">'+(h.sessNumber?'#'+h.sessNumber+' · ':'')+h.label+'</div></div>'
      +'<div class="h-right"><div class="h-stat">'+h.done+'/'+h.total+'</div>'
      +'<div class="h-sub">'+(h.duration?h.duration+' min':'—')+'</div></div>'
      +'</div>';
  }).join('');
}

function openHistDetail(idx){
  const h=history[idx];if(!h)return;
  const sess=SESSIONS[h.session];
  const d=new Date(h.date);
  const isMostRecent=idx===0;
  let html='';
  // Header
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">'
    +'<button style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0" onclick="closeHistModal()">←</button>'
    +'</div>';
  html+='<div class="hd-header">'
    +'<div class="hd-sess-num">'+(h.sessNumber?'Treningsøkt #'+h.sessNumber:'Session')+'</div>'
    +'<div class="hd-title">'+h.label+'</div>'
    +'<div class="hd-sub">'+d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+'</div>'
    +'<div class="hd-meta">'
    +'<div class="hd-meta-item"><strong>'+h.done+'/'+h.total+'</strong>exercises</div>'
    +'<div class="hd-meta-item"><strong>'+(h.duration||'—')+'</strong>minutes</div>'
    +'</div></div>';
  if(h.checkin){html+='<div class="hd-checkin">'+esc(h.checkin)+'</div>';}
  // Exercises
  sess.groups.forEach(grp=>{
    const grpExs=grp.exercises.filter(ex=>h.log[ex.id]);
    if(!grpExs.length)return;
    html+='<div class="hd-group"><div class="hd-group-title">'+grp.title+'</div>';
    grp.exercises.forEach(ex=>{
      const le=h.log[ex.id];if(!le)return;
      if(ex.type==='warmup'){
        const mv=le.metrics||{};
        html+='<div class="hd-ex'+(le.done?' hd-ex-done':'')+'"><div class="hd-ex-name">'+(le.done?'<div class="hd-ex-check">✓</div>':'')+''+ex.name+'</div>'
          +'<div style="font-size:11px;color:var(--muted)">Setting '+(mv.setting||'?')+' · '+(mv.duration||'?')+' min · '+(mv.distance||'?')+' m</div></div>';
      } else if(ex.type==='checkbox'){
        html+='<div class="hd-ex'+(le.done?' hd-ex-done':'')+'"><div class="hd-ex-name">'+(le.done?'<div class="hd-ex-check">✓</div>':'')+''+ex.name+'</div></div>';
      } else {
        const sets=(le.sets||[]).filter(s=>s.logged);
        const isSkip=le.skipped;
        html+='<div class="hd-ex'+((!isSkip&&sets.length>0&&(le.sets||[]).every(s=>s.logged))?' hd-ex-done':'')+(isSkip?' hd-ex-skipped':'')+'"><div class="hd-ex-name">'
          +(isSkip?'<div class="hd-ex-skip">⊘</div>':sets.length>0&&(le.sets||[]).every(s=>s.logged)?'<div class="hd-ex-check">✓</div>':'')
          +(le.displayName||ex.name)+'</div>';
        if(le.warmupSetDone)html+='<div style="font-size:10px;color:var(--muted);margin-bottom:4px">Warm-up: 20 kg ✓</div>';
        if(sets.length){html+='<div class="hd-sets">'+sets.map((s,i)=>'<div class="hd-set-chip">S'+(i+1)+': '+fmtSet(s)+'</div>').join('')+'</div>';}
        if(le.note)html+='<div class="hd-note">'+esc(le.note)+'</div>';
        html+='</div>';
      }
    });
    html+='</div>';
  });
  // Buttons
  html+='<div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">';
  const copyBtnId='histCopyBtn_'+idx;
  html+='<button class="modal-btn-outline" id="'+copyBtnId+'" onclick="histCopy('+idx+',\''+copyBtnId+'\')"><span>⎘</span> Copy Summary</button>';
  if(isMostRecent){
    html+='<button class="modal-btn-gold" onclick="continueSession('+idx+')">↩ Continue This Session</button>';
  }
  html+='</div>';
  document.getElementById('histModalContent').innerHTML=html;
  document.getElementById('histModal').classList.add('show');
}

function closeHistModal(){document.getElementById('histModal').classList.remove('show');}

function histCopy(idx,btnId){
  const h=history[idx];if(!h)return;
  const text=buildSummaryText(h);
  const btn=document.getElementById(btnId);
  navigator.clipboard.writeText(text).then(()=>{if(btn){btn.innerHTML='<span>✓</span> Copied';btn.classList.add('copied');}})
  .catch(()=>{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);if(btn){btn.innerHTML='<span>✓</span> Copied';btn.classList.add('copied');}});
}

function continueSession(idx){
  // Restore most recent session — remove from history and restore state
  const h=history[idx];if(!h)return;
  // Only allow for most recent
  if(idx!==0)return;
  history.shift();
  try{localStorage.setItem('tlog_h',JSON.stringify(history.slice(0,60)));}catch(e){}
  closeHistModal();
  // Switch to the session tab
  curSess=h.session;sessStart=new Date();
  initSessState(curSess);
  // Restore logged set data from history
  const sess=SESSIONS[curSess];
  sess.groups.forEach(g=>g.exercises.forEach(ex=>{
    if(ex.type==='warmup'&&h.log[ex.id]){wuData[ex.id]={metrics:{...h.log[ex.id].metrics},done:h.log[ex.id].done};}
    else if(ex.type==='checkbox'&&h.log[ex.id]){cbData[ex.id]=h.log[ex.id].done;}
    else if(h.log[ex.id]){
      const le=h.log[ex.id];
      if(le.sets)setData[ex.id]=le.sets.map(s=>({...s}));
      if(le.note)notes[ex.id]=le.note;
      if(le.skipped)skipped[ex.id]=true;
      if(le.warmupSetDone)cbWarmup[ex.id]=true;
      if(le.displayName&&le.displayName!==ex.name)renames[ex.id]=le.displayName;
    }
  }));
  checkinText=h.checkin||'';
  // Navigate to session page
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-session').classList.add('active');
  document.querySelectorAll('.nav-btn')[1].classList.add('active');
  document.getElementById('finishBar').style.display='flex';
  // Select the right tab
  const tabs=document.querySelectorAll('.sess-tab');
  const tabMap={A:0,B:1,C:2};
  tabs.forEach(t=>t.classList.remove('active'));
  if(tabs[tabMap[curSess]])tabs[tabMap[curSess]].classList.add('active');
  renderSessContent();
  updateHomeStats();
}

// ── PWA ───────────────────────────────────────────────────────────────
(function(){
  if('serviceWorker' in navigator){
    const sw=`const CACHE='trening-v4';self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(n=>n!==CACHE).map(n=>caches.delete(n)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>new Response('Offline',{status:503}))));});`;
    const b=new Blob([sw],{type:'text/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});
  }
})();

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
</script>
