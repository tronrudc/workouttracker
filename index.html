<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trening</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trening">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f18">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-apple.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0f18;--bg2:#0e1520;--surface:#121c2e;--surface2:#172236;
  --border:rgba(255,255,255,0.06);--border-md:rgba(255,255,255,0.10);--border-lt:rgba(255,255,255,0.14);
  --text:#dce6f5;--text2:#a8bcd4;--muted:#5a7494;--faint:#2e4460;
  --gold:#ffaf00;--gold-dim:#cc8c00;
  --gold-glow:rgba(255,175,0,0.15);--gold-glow2:rgba(255,175,0,0.08);--gold-glow3:rgba(255,175,0,0.04);
  --logged-bg:rgba(255,175,0,0.06);--logged-border:rgba(255,175,0,0.28);
  --skipped-bg:rgba(90,116,148,0.08);--skipped-border:rgba(90,116,148,0.3);
  --rehab-color:#e09060;--rehab-bg:rgba(224,144,96,0.10);
  --breath-color:#5b9bd5;--breath-bg:rgba(91,155,213,0.10);
  --warn:#d44030;--radius:3px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");}
.app{max-width:480px;margin:0 auto;padding-bottom:120px;overflow-x:hidden}

/* HEADER */
.header{padding:52px 20px 28px;position:relative}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.4}
.header-eye{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.header-eye::before{content:'';display:inline-block;width:20px;height:1px;background:var(--gold);opacity:0.6}
.header-title{font-family:'Playfair Display',serif;font-size:40px;font-weight:400;line-height:1.1;color:var(--text);letter-spacing:-0.5px}
.header-title em{font-style:italic;color:var(--gold)}
.header-date{font-size:11px;color:var(--muted);margin-top:10px}

/* NAV */
.nav{display:flex;border-top:1px solid var(--border);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;background:rgba(10,15,24,0.94);backdrop-filter:blur(16px)}
.nav-btn{flex:1;background:none;border:none;padding:15px 0;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:color .25s;position:relative}
.nav-btn::after{content:'';position:absolute;bottom:-1px;left:30%;right:30%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);transform:scaleX(0);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.nav-btn.active{color:var(--text)}
.nav-btn.active::after{transform:scaleX(1)}

/* PAGES */
.page{display:none;padding:28px 20px 0;animation:fadeUp .3s cubic-bezier(.4,0,.2,1)}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* QUOTE */
.quote-card{padding:26px 0;border-bottom:1px solid var(--border);margin-bottom:28px;cursor:pointer;position:relative}
.quote-open{position:absolute;top:20px;left:0;font-family:'Playfair Display',serif;font-size:55px;line-height:1;color:var(--gold);opacity:0.15;pointer-events:none;font-style:italic}
.quote-body{font-family:'Playfair Display',serif;font-size:18px;font-style:italic;font-weight:400;line-height:1.6;color:var(--text2);transition:opacity .25s;padding:0 28px 0 18px}
.quote-attr{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:12px;padding-left:18px;display:flex;align-items:center;gap:8px}
.quote-attr::before{content:'';width:14px;height:1px;background:var(--gold);opacity:0.5}
.quote-refresh{position:absolute;top:26px;right:0;color:var(--faint);font-size:16px;transition:color .2s,transform .4s cubic-bezier(.4,0,.2,1);user-select:none;padding:4px}
.quote-card:hover .quote-refresh{color:var(--gold);transform:rotate(180deg)}

/* HOME STATS */
.bench-target{background:var(--surface);border:1px solid var(--border-md);border-radius:var(--radius);padding:20px 18px;margin-bottom:14px;position:relative;overflow:hidden}
.bench-target::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.bt-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.bt-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.bt-deadline{font-size:10px;color:var(--warn);letter-spacing:0.5px;font-weight:500}
.bt-main{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.bt-current-wrap{display:flex;align-items:baseline;gap:4px;cursor:pointer}
.bt-current{font-family:'Playfair Display',serif;font-size:36px;color:var(--text);line-height:1;cursor:pointer;border-bottom:1px solid transparent;transition:border-color .2s}
.bt-current:hover{border-bottom-color:var(--gold)}
.bt-current-inp{font-family:'Playfair Display',serif;font-size:36px;color:var(--gold);background:transparent;border:none;border-bottom:1px solid var(--gold);outline:none;width:80px;text-align:left;padding:0;-moz-appearance:textfield}
.bt-current-inp::-webkit-inner-spin-button,.bt-current-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.bt-arrow{font-size:14px;color:var(--faint)}
.bt-target{font-family:'Playfair Display',serif;font-size:36px;color:var(--gold);line-height:1}
.bt-sub{font-size:11px;color:var(--muted);margin-bottom:14px}
.bt-bar-bg{height:2px;background:var(--border-md);border-radius:2px;position:relative}
.bt-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1);position:relative}
.bt-bar-fill::after{content:'';position:absolute;right:-5px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);border:2px solid var(--surface)}
.bt-bar-labels{display:flex;justify-content:space-between;margin-top:7px}
.bt-bar-lbl{font-size:10px;color:var(--muted)}

.goals-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.goal-cell{background:var(--surface);padding:16px 16px 14px}
.goal-lbl{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.goal-num{font-family:'Playfair Display',serif;font-size:32px;font-weight:400;color:var(--gold);line-height:1;cursor:pointer;border-bottom:1px solid transparent;transition:border-color .2s;display:inline-block}
.goal-num:hover{border-bottom-color:var(--gold)}
.goal-num-inp{font-family:'Playfair Display',serif;font-size:32px;color:var(--gold);background:transparent;border:none;border-bottom:1px solid var(--gold);outline:none;width:70px;padding:0;-moz-appearance:textfield}
.goal-num-inp::-webkit-inner-spin-button,.goal-num-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.goal-unit{font-size:11px;color:var(--muted);margin-top:4px}

.weight-row{display:flex;align-items:center;gap:10px;padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;flex-wrap:wrap}
.weight-row label{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted)}
.weight-inp{background:none;border:none;border-bottom:1px solid var(--border-lt);font-family:'Playfair Display',serif;font-size:26px;color:var(--text);width:58px;text-align:center;outline:none;padding:0 4px;transition:border-color .2s}
.weight-inp:focus{border-bottom-color:var(--gold)}
.weight-kg{font-size:12px;color:var(--muted)}
.weight-gap{font-size:12px;color:var(--gold);margin-left:auto;font-weight:500}
.weight-goal-hint{font-size:11px;color:var(--muted)}
.last-sess{padding:18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.last-lbl{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.last-body{font-size:13px;color:var(--text2);line-height:1.8}
.last-body strong{color:var(--text);font-weight:500}

/* SESSION TABS */
.sess-tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border-md);border-radius:var(--radius);overflow:hidden;margin-bottom:22px}
.sess-tab{background:var(--surface);padding:15px 8px;cursor:pointer;border:none;text-align:left;transition:background .2s;position:relative}
.sess-tab::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);transform:scaleX(0);transition:transform .25s;transform-origin:center}
.sess-tab.active{background:var(--gold-glow2)}
.sess-tab.active::after{transform:scaleX(1)}
.stab-name{font-family:'Playfair Display',serif;font-size:12px;font-weight:400;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stab-sub{font-size:9px;color:var(--muted)}

/* CHECK-IN */
.checkin-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.checkin-head{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.checkin-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:0.7;flex-shrink:0}
.checkin-title{font-size:12px;font-weight:500;color:var(--text);flex:1}
.checkin-hint{font-size:11px;color:var(--muted);font-style:italic}
.checkin-body{padding:12px 16px}
.checkin-prompts{font-size:10px;color:var(--faint);letter-spacing:0.5px;margin-bottom:8px;line-height:1.7}
.checkin-area{width:100%;border:1px solid var(--border-md);background:var(--bg2);border-radius:var(--radius);padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;color:var(--text);resize:none;outline:none;transition:border-color .2s;line-height:1.6;min-height:64px}
.checkin-area:focus{border-color:rgba(255,175,0,0.4)}
.checkin-area::placeholder{color:var(--faint);font-style:italic}

/* ABBY NOTE */
.abby-note{padding:10px 13px;background:rgba(91,155,213,0.06);border-left:2px solid var(--breath-color);border-radius:0 var(--radius) var(--radius) 0;margin:10px 0;font-size:11px;color:var(--text2);font-style:italic;line-height:1.6}
.abby-note strong{color:var(--breath-color);font-style:normal;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:3px}

/* BLOCK */
.block-sec{margin-bottom:22px}
.block-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);opacity:0.85;padding:0 0 9px;display:flex;align-items:center;gap:10px}
.block-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border-md),transparent)}
.superset-wrap{position:relative}
.superset-wrap::before{content:'';position:absolute;left:0;top:30px;bottom:6px;width:2px;background:linear-gradient(180deg,var(--gold),transparent);opacity:0.25}
.superset-tag{display:flex;align-items:center;gap:8px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);opacity:0.7;padding:7px 14px 6px;background:var(--gold-glow3);border:1px solid var(--border);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0}

/* EXERCISE CARD */
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;transition:border-color .25s,background .25s,box-shadow .25s;position:relative}
.ex-card:hover{border-color:var(--border-md)}
.ex-card.done{border-color:var(--logged-border);background:var(--logged-bg);box-shadow:0 0 24px var(--gold-glow3)}
.ex-card.done::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:shimmer 2s ease-in-out infinite}
@keyframes shimmer{0%,100%{opacity:0.3}50%{opacity:0.8}}
.ex-card.skipped{border-color:var(--skipped-border);background:var(--skipped-bg);opacity:0.65}
.ex-card.skipped .ex-name{text-decoration:line-through;text-decoration-color:var(--faint)}
.superset-wrap .ex-card{border-radius:0;border-left:none}
.superset-wrap .ex-card:first-child{border-top-right-radius:var(--radius)}
.superset-wrap .ex-card:last-child{border-bottom-left-radius:var(--radius);border-bottom-right-radius:var(--radius)}

.ex-head{display:flex;align-items:center;padding:13px 14px;gap:11px;user-select:none}
.ex-tick{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border-lt);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .25s;font-size:10px;color:transparent;cursor:pointer;position:relative}
.ex-tick::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:1px solid transparent;transition:border-color .25s}
.ex-card.done .ex-tick{background:var(--gold);border-color:var(--gold);color:#0a0f18;font-weight:700}
.ex-card.done .ex-tick::after{border-color:var(--gold-glow)}
.ex-card.skipped .ex-tick{background:rgba(90,116,148,0.25);border-color:var(--skipped-border);color:var(--muted);font-size:13px;font-weight:700}
.ex-meta{flex:1;min-width:0;cursor:pointer}
.ex-name{font-size:14px;font-weight:500;color:var(--text);letter-spacing:0.1px}
.ex-name-renamed{color:var(--gold);opacity:0.9}
.ex-presc{font-size:11px;color:var(--muted);margin-top:2px}
.ex-tags{display:flex;gap:5px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.ex-tag-rehab{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--rehab-color);background:var(--rehab-bg);padding:2px 7px;border-radius:20px;border:1px solid rgba(224,144,96,0.2)}
.ex-tag-breath{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--breath-color);background:var(--breath-bg);padding:2px 7px;border-radius:20px;border:1px solid rgba(91,155,213,0.2)}
.ex-summary{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);white-space:nowrap;line-height:1}
.skip-toggle{width:28px;height:28px;border-radius:4px;border:1.5px solid var(--border-lt);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:11px;color:var(--faint);background:transparent;font-family:'DM Sans',sans-serif;padding:0}
.skip-toggle:hover{border-color:var(--muted);color:var(--muted);background:rgba(90,116,148,0.08)}
.ex-card.skipped .skip-toggle{background:rgba(90,116,148,0.15);border-color:var(--skipped-border);color:var(--muted)}

.ex-body{padding:0 14px 14px;border-top:1px solid var(--border)}
.ex-card.done .ex-body{border-top-color:var(--logged-border)}
.ex-card.skipped .ex-body{display:none}

/* LAST SESSION */
.last-sets-block{margin:12px 0 10px;padding:10px 12px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius)}
.last-sets-title{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--faint);margin-bottom:7px}
.last-sets-row{display:flex;gap:6px;flex-wrap:wrap}
.last-set-chip{font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);padding:4px 9px;border-radius:2px}
.last-note-block{font-size:11px;color:var(--text2);font-style:italic;margin-bottom:9px;padding:7px 11px;border-left:2px solid rgba(255,175,0,0.22);background:var(--gold-glow3);border-radius:0 var(--radius) var(--radius) 0;line-height:1.5}

/* WARMUP SET */
.warmup-set-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);margin-bottom:4px}
.warmup-set-lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);flex:1}
.warmup-set-weight{font-size:12px;color:var(--faint)}

/* SETS */
.sets-title{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin:12px 0 7px}
.sets-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.set-row{display:flex;align-items:center;gap:6px;padding:7px 10px;border:1px solid var(--border);background:rgba(255,255,255,0.018);border-radius:var(--radius);transition:all .2s}
.set-row.set-logged{background:var(--logged-bg);border-color:var(--logged-border)}
.set-num{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);width:26px;flex-shrink:0}
.set-stepper{display:flex;align-items:center;gap:3px;flex:1;min-width:0;overflow:hidden}
.set-step-group{display:flex;align-items:center;border:1px solid var(--border-lt);background:var(--surface2);border-radius:2px;overflow:hidden;flex-shrink:1}
.set-row.set-logged .set-step-group{border-color:rgba(255,175,0,0.22)}
.set-step-btn{width:26px;height:30px;background:none;border:none;font-size:16px;font-weight:200;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s;flex-shrink:0}
.set-step-btn:hover{color:var(--gold);background:var(--gold-glow2)}
.set-step-btn:active{transform:scale(0.88)}
.set-step-val{font-family:'Playfair Display',serif;font-size:17px;color:var(--text);min-width:28px;max-width:44px;text-align:center;line-height:30px;cursor:text}
.set-step-inp{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold);background:transparent;border:none;border-bottom:1px solid var(--gold);outline:none;width:44px;text-align:center;line-height:30px;padding:0;-moz-appearance:textfield}
.set-step-inp::-webkit-inner-spin-button,.set-step-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.set-step-unit{font-size:10px;color:var(--faint);margin-right:2px}
.set-sep{font-size:11px;color:var(--faint);padding:0 1px;opacity:0.6}
.set-log-btn{padding:0 10px;height:30px;background:var(--gold);border:none;color:#0a0f18;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:opacity .15s,box-shadow .15s;flex-shrink:0;white-space:nowrap}
.set-log-btn:hover{opacity:.85;box-shadow:0 0 10px var(--gold-glow)}
.set-row.set-logged .set-log-btn{background:transparent;border:1px solid var(--logged-border);color:var(--gold);font-size:14px;font-weight:400;letter-spacing:0;padding:0 8px}

/* NOTES */
.note-lbl{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--faint);margin-bottom:5px}
.note-area{width:100%;border:1px solid var(--border-md);background:var(--bg2);border-radius:var(--radius);padding:8px 11px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:300;color:var(--text);resize:none;outline:none;transition:border-color .2s;line-height:1.6;min-height:42px}
.note-area:focus{border-color:rgba(255,175,0,0.35)}
.note-area::placeholder{color:var(--faint);font-style:italic}
.coach-note{font-size:11px;color:var(--faint);font-style:italic;margin-top:9px;line-height:1.6;padding-left:9px;border-left:1px solid var(--border-md)}

/* WARMUP CARD */
.warmup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;transition:border-color .25s}
.warmup-card.done{border-color:var(--logged-border);background:var(--logged-bg)}
.warmup-head{display:flex;align-items:center;padding:13px 14px;gap:11px}
.warmup-title{font-size:14px;font-weight:500;color:var(--text);flex:1}
.warmup-body{padding:0 14px 14px;border-top:1px solid var(--border)}
.warmup-card.done .warmup-body{border-top-color:var(--logged-border)}
.warmup-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.warmup-metric{display:flex;flex-direction:column;align-items:center;gap:4px}
.warmup-metric-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.warmup-stepper{display:flex;align-items:center;border:1px solid var(--border-lt);background:var(--surface2);border-radius:2px;overflow:hidden;width:100%}
.warmup-step-btn{width:26px;height:32px;background:none;border:none;font-size:15px;font-weight:200;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color .15s,background .15s}
.warmup-step-btn:hover{color:var(--gold);background:var(--gold-glow2)}
.warmup-step-val{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);flex:1;text-align:center;line-height:32px}
.warmup-metric-unit{font-size:9px;color:var(--faint)}
.warmup-done-btn{width:100%;margin-top:12px;padding:9px;background:var(--gold);border:none;color:#0a0f18;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:opacity .15s}
.warmup-done-btn:hover{opacity:.85}
.warmup-done-btn.done-state{background:transparent;border:1px solid var(--logged-border);color:var(--gold)}

/* CHECKBOX ROW */
.checkbox-row{display:flex;align-items:center;gap:11px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;user-select:none;transition:all .2s}
.checkbox-row:hover{border-color:var(--border-md)}
.checkbox-row.checked{background:var(--logged-bg);border-color:var(--logged-border)}
.cb-box{width:20px;height:20px;border-radius:3px;border:1.5px solid var(--border-lt);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:11px;color:transparent}
.checkbox-row.checked .cb-box{background:var(--gold);border-color:var(--gold);color:#0a0f18;font-weight:700}
.cb-label{font-size:13px;font-weight:400;color:var(--text)}

/* CONTEXT MENU */
.ctx-overlay{position:fixed;inset:0;z-index:300;background:transparent}
.ctx-menu{position:fixed;background:var(--surface2);border:1px solid var(--border-md);border-radius:6px;padding:6px 0;z-index:301;min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:ctxIn .15s ease}
@keyframes ctxIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.ctx-item{padding:11px 16px;font-size:13px;color:var(--text2);cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:10px;white-space:nowrap}
.ctx-item:hover{background:var(--gold-glow2);color:var(--text)}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}
.rename-input{background:transparent;border:none;border-bottom:1px solid var(--gold);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;outline:none;width:100%;padding:2px 0}

/* ADD CUSTOM */
.add-custom-btn{display:flex;align-items:center;gap:10px;width:100%;background:none;border:1px dashed var(--border-md);border-radius:var(--radius);padding:12px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);transition:all .2s;margin-top:4px}
.add-custom-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-glow3)}
.add-custom-plus{font-size:19px;font-weight:200;line-height:1;color:var(--gold);opacity:0.7}
.custom-form{background:var(--surface);border:1px solid var(--border-md);border-radius:var(--radius);padding:16px 14px;margin-bottom:8px}
.custom-form-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.custom-name-inp{width:100%;border:none;border-bottom:1px solid var(--border-lt);background:none;font-family:'Playfair Display',serif;font-size:20px;color:var(--text);outline:none;padding:4px 0 7px;margin-bottom:14px;transition:border-color .2s}
.custom-name-inp:focus{border-bottom-color:var(--gold)}
.custom-name-inp::placeholder{color:var(--faint);font-style:italic}
.metric-toggle{display:flex;gap:6px;margin-bottom:12px}
.metric-toggle-btn{flex:1;padding:7px;border:1px solid var(--border-md);background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s}
.metric-toggle-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-glow3)}
.custom-form-btns{display:flex;gap:8px;margin-top:10px}
.custom-save-btn{flex:1;background:var(--gold);color:#0a0f18;border:none;padding:10px;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .15s}
.custom-cancel-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:10px 14px;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.custom-cancel-btn:hover{border-color:var(--warn);color:var(--warn)}
.add-set-btn{background:none;border:1px dashed var(--border-md);width:100%;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;margin-bottom:8px;border-radius:2px}
.add-set-btn:hover{border-color:var(--gold);color:var(--gold)}

/* FINISH BAR */
.finish-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,24,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border-md);padding:14px 20px;display:none;gap:10px;z-index:100}
.btn-finish{flex:1;background:var(--gold);color:#0a0f18;border:none;padding:15px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:opacity .15s,box-shadow .2s}
.btn-finish:hover{opacity:.9;box-shadow:0 0 20px var(--gold-glow)}
.btn-reset{background:none;border:1px solid var(--border-md);color:var(--muted);padding:15px 16px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn-reset:hover{border-color:var(--warn);color:var(--warn)}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s}
.modal-ov.show{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-top:1px solid var(--border-md);border-left:1px solid var(--border);border-right:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;padding:32px 24px 44px;max-width:480px;width:100%;transform:translateY(40px);transition:transform .4s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.modal-ov.show .modal{transform:translateY(0)}
.modal-eye{font-size:9px;letter-spacing:3.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.modal-title{font-family:'Playfair Display',serif;font-size:38px;font-weight:400;line-height:1.05;margin-bottom:20px;color:var(--text)}
.modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border-md);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.modal-stat{background:var(--surface);padding:14px 16px}
.modal-stat-val{font-family:'Playfair Display',serif;font-size:32px;color:var(--gold);line-height:1}
.modal-stat-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.modal-quote{padding:16px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:18px}
.modal-qt{font-family:'Playfair Display',serif;font-size:17px;font-style:italic;font-weight:400;line-height:1.65;color:var(--text2)}
.modal-qa{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:10px;display:flex;align-items:center;gap:8px}
.modal-qa::before{content:'';width:12px;height:1px;background:var(--gold);opacity:0.5}
.modal-btn-gold{width:100%;background:var(--gold);color:#0a0f18;border:none;padding:15px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:opacity .15s,box-shadow .2s;margin-bottom:10px;display:block}
.modal-btn-gold:hover{opacity:.9;box-shadow:0 0 20px var(--gold-glow)}
.modal-btn-outline{width:100%;background:none;border:1px solid var(--border-md);color:var(--text2);padding:13px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:10px}
.modal-btn-outline:hover,.modal-btn-outline.copied{border-color:var(--gold);color:var(--gold);background:var(--gold-glow3)}

/* HISTORY */
.hist-entry{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.hist-entry:hover{opacity:0.8}
.hist-entry:first-child{border-top:1px solid var(--border)}
.h-date{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.h-name{font-size:14px;color:var(--text);font-weight:500}
.h-right{text-align:right}
.h-stat{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);line-height:1}
.h-sub{font-size:10px;color:var(--muted);margin-top:3px}
.empty-state{font-size:14px;color:var(--muted);padding:28px 0;font-style:italic;text-align:center}

/* HISTORY DETAIL MODAL */
.hist-detail-modal{background:var(--bg2);border-top:1px solid var(--border-md);border-left:1px solid var(--border);border-right:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;padding:28px 24px 44px;max-width:480px;width:100%;transform:translateY(40px);transition:transform .4s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden;max-height:88vh;overflow-y:auto}
.hist-detail-modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.modal-ov.show .hist-detail-modal{transform:translateY(0)}
.hd-header{margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.hd-sess-num{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.hd-title{font-family:'Playfair Display',serif;font-size:26px;color:var(--text);margin-bottom:4px}
.hd-sub{font-size:11px;color:var(--muted)}
.hd-meta{display:flex;gap:16px;margin-top:10px}
.hd-meta-item{font-size:11px;color:var(--muted)}
.hd-meta-item strong{color:var(--gold);font-family:'Playfair Display',serif;font-size:18px;display:block;font-weight:400}
.hd-checkin{padding:10px 12px;background:var(--gold-glow3);border-left:2px solid rgba(255,175,0,0.3);border-radius:0 var(--radius) var(--radius) 0;margin-bottom:16px;font-size:12px;color:var(--text2);font-style:italic;line-height:1.5}
.hd-group{margin-bottom:18px}
.hd-group-title{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);opacity:0.8;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.hd-ex{margin-bottom:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.hd-ex.hd-ex-done{border-color:var(--logged-border);background:var(--logged-bg)}
.hd-ex.hd-ex-skipped{opacity:0.6}
.hd-ex-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.hd-ex-check{width:16px;height:16px;border-radius:50%;background:var(--gold);display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:#0a0f18;font-weight:700;flex-shrink:0}
.hd-ex-skip{width:16px;height:16px;border-radius:50%;background:rgba(90,116,148,0.3);display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);flex-shrink:0}
.hd-sets{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.hd-set-chip{font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);padding:3px 8px;border-radius:2px}
.hd-note{font-size:11px;color:var(--muted);font-style:italic;margin-top:4px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-eye">Trening</div>
    <div class="header-title">Good to see<br>you, <em>athlete.</em></div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showPage('home',this)">Home</button>
    <button class="nav-btn" onclick="showPage('session',this)">Session</button>
    <button class="nav-btn" onclick="showPage('history',this)">History</button>
  </nav>

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="quote-card" onclick="cycleQuote()">
      <div class="quote-open">"</div>
      <div class="quote-body" id="quoteText"></div>
      <div class="quote-attr" id="quoteAuthor"></div>
      <div class="quote-refresh">↻</div>
    </div>
    <div class="bench-target">
      <div class="bt-top"><div class="bt-label">Bench Press Target</div><div class="bt-deadline" id="btDeadline"></div></div>
      <div class="bt-main">
        <div class="bt-current-wrap" onclick="editBenchCurrent()">
          <span class="bt-current" id="btCurrent">42.5</span>
        </div>
        <div class="bt-arrow">→</div>
        <div class="bt-target">50 kg × 8</div>
      </div>
      <div class="bt-sub" id="btSub"></div>
      <div class="bt-bar-bg"><div class="bt-bar-fill" id="btBarFill" style="width:0%"></div></div>
      <div class="bt-bar-labels"><span class="bt-bar-lbl" id="btBarL">42.5 kg</span><span class="bt-bar-lbl">50 kg</span></div>
    </div>
    <div class="goals-grid">
      <div class="goal-cell">
        <div class="goal-lbl">Sessions This Year</div>
        <div id="yearNumWrap"><span class="goal-num" id="yearSessions" onclick="editGoalNum('year')">25</span></div>
        <div class="goal-unit">and counting</div>
      </div>
      <div class="goal-cell">
        <div class="goal-lbl">This Month</div>
        <div id="monthNumWrap"><span class="goal-num" id="goalSessions" onclick="editGoalNum('month')">2</span></div>
        <div class="goal-unit">of 8 sessions</div>
      </div>
    </div>
    <div class="weight-row">
      <label>Current weight</label>
      <input class="weight-inp" type="number" id="currentWeight" placeholder="65" step="0.5" oninput="updateWeightGoal()">
      <span class="weight-kg">kg</span>
      <span class="weight-gap" id="weightGap"></span>
      <span class="weight-goal-hint">Goal: 75 kg</span>
    </div>
    <div class="last-sess"><div class="last-lbl">Last Session</div><div class="last-body" id="lastBody">No sessions logged yet.</div></div>
  </div>

  <!-- SESSION -->
  <div class="page" id="page-session">
    <div class="sess-tabs">
      <button class="sess-tab active" onclick="selectSess('A',this)"><div class="stab-name">Sun Eater</div><div class="stab-sub">Chest · Core</div></button>
      <button class="sess-tab" onclick="selectSess('B',this)"><div class="stab-name">Bridge 4</div><div class="stab-sub">Pull · Legs</div></button>
      <button class="sess-tab" onclick="selectSess('C',this)"><div class="stab-name">Sylphrena</div><div class="stab-sub">Freestyle</div></button>
    </div>
    <div id="sessContent"></div>
  </div>

  <!-- HISTORY -->
  <div class="page" id="page-history"><div id="histList"></div></div>
</div>

<div class="finish-bar" id="finishBar">
  <button class="btn-reset" onclick="resetSess()">Reset</button>
  <button class="btn-finish" onclick="confirmFinish()">Complete Session</button>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-ov" id="confirmModal">
  <div class="modal" style="padding-bottom:32px">
    <div class="modal-eye">Are you sure?</div>
    <div class="modal-title" style="font-size:30px;margin-bottom:14px">Complete<br>this session?</div>
    <div id="confirmSummary" style="font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.6"></div>
    <button class="modal-btn-gold" onclick="doFinish()">Yes, Complete Session</button>
    <button class="modal-btn-outline" onclick="closeConfirm()">↩ Continue Session</button>
  </div>
</div>

<!-- COMPLETION MODAL -->
<div class="modal-ov" id="modal">
  <div class="modal">
    <div class="modal-eye" id="modalEye"></div>
    <div class="modal-title">Session<br>Complete.</div>
    <div class="modal-stats" id="modalStats"></div>
    <div class="modal-quote"><div class="modal-qt" id="modalQt"></div><div class="modal-qa" id="modalQa"></div></div>
    <button class="modal-btn-outline" id="copyBtn" onclick="copySummary()" style="margin-bottom:10px"><span>⎘</span> Copy Session Summary</button>
    <button class="modal-btn-outline" onclick="resumeSession()" style="margin-bottom:10px">↩ Resume Session</button>
    <button class="modal-btn-gold" onclick="closeModal()">Back to Home</button>
  </div>
</div>

<!-- HISTORY DETAIL MODAL -->
<div class="modal-ov" id="histModal">
  <div class="hist-detail-modal" id="histModalContent"></div>
</div>

<!-- CONTEXT MENU -->
<div class="ctx-overlay" id="ctxOverlay" style="display:none" onclick="closeCtx()"></div>
<div class="ctx-menu" id="ctxMenu" style="display:none"></div>

<script>
const QUOTES=[
  {t:"It is a shame for a man to grow old without seeing the beauty and strength of which his body is capable.",a:"Socrates"},
  {t:"If you don't know what to pursue in life right now, pursue yourself. Become the healthiest, happiest, most healed version of yourself.",a:"Unknown"},
  {t:"We are what we repeatedly do. Excellence, then, is not an act but a habit.",a:"Aristotle"},
  {t:"Smil og vær glad for hver dag som går, så skal du se hvor mange venner du får.",a:"Norwegian proverb"},
  {t:"The groundwork for all happiness is good health.",a:"Leigh Hunt"},
  {t:"You don't have to be extreme, just consistent.",a:"Unknown"},
  {t:"Strength does not come from physical capacity. It comes from an indomitable will.",a:"Gandhi"},
  {t:"Every session is a vote for the person you are becoming.",a:"Unknown"},
  {t:"Take care of your body. It's the only place you have to live.",a:"Jim Rohn"},
  {t:"The body achieves what the mind believes.",a:"Unknown"},
];

// ── SESSION TEMPLATES ─────────────────────────────────────────────────
const SESSIONS={
  A:{label:"Sun Eater",sub:"Chest · Core · Arms · Back",groups:[
    {title:"Warm-Up",exercises:[
      {id:"wu_row_a",type:"warmup",name:"Rowing Machine",metrics:[
        {id:"setting",label:"Setting",val:"9",step:1,unit:"",min:1,max:20},
        {id:"duration",label:"Duration",val:"5",step:1,unit:"min",min:1,max:30},
        {id:"distance",label:"Distance",val:"1000",step:50,unit:"m",min:0,max:5000},
      ]},
      {id:"wu_mobility_a",type:"checkbox",name:"Mobility (arm circles, thoracic openers, knee-to-chest, spinal twist, knee hug)"},
      {id:"wu_breath_a",type:"checkbox",name:"Breathing Reset — 60 sec (hands on lower ribs, 2–3 in / 3–4 out, pause at end)",breath:true},
    ]},
    {title:"Core + Chest Supersets",exercises:[
      {id:"incline_bench",name:"Incline Barbell Bench Press",prescription:"4 × 8 · 2.5 min rest",sets:4,dw:"35",dr:"8",note:"Progression: add 2.5 kg when all 4×8 clean, twice in a row.",warmupSet:true,breath:true,
        abbyNote:"Engage your core instead of flaring at the ribs. Draw your ribs towards your hips. Exhale on the press, inhale on the way down — belly first, not chest."},
    ]},
    {title:"Superset 2A/2B",superset:true,exercises:[
      {id:"cable_crunch",name:"Weighted Cable Crunch",prescription:"3 × 13",sets:3,dw:"27",dr:"13",note:"Hold 27 kg, push toward 3×15 before adding weight.",breath:true,
        abbyNote:"Exhale fully as you crunch down — let the breath drive the movement, not the other way around."},
      {id:"dead_bug",name:"Dead Bug",prescription:"3 × 8/side",sets:3,dw:"—",dr:"8",note:"Active rest from the crunch. Keep it slow. If you rush it, you're doing it wrong.",noStepW:true,breath:true,
        abbyNote:"Controlled movements — 1 count inhale, 3–4 count slow exhale as you extend the limbs. No breath-holding under any circumstance."},
    ]},
    {title:"Chest-Supported Row",exercises:[
      {id:"cs_row_a",name:"Chest-Supported DB Row",prescription:"3 × 10–12 · 2 min rest",sets:3,dw:"16",dr:"10",note:"You should feel this exclusively in your mid-back and rear delts. No lower back involvement at all. If your lower back is working, the chest pad isn't supporting you properly — adjust the bench angle. Progression: add 2 kg when 3×12 is controlled across both sets.",breath:true,
        abbyNote:"Exhale during the pull, inhale on the return — lower ribs expanding, shoulders staying down."},
    ]},
    {title:"Superset 4A/4B",superset:true,exercises:[
      {id:"cable_fly",name:"Cable Pec Fly",prescription:"3 × 12",sets:3,dw:"15",dr:"12",note:"15–18 kg per side. Keep a slight elbow bend throughout. Pause at the peak contraction.",
        abbyNote:"Use a quick reset if you feel chest tightness — purse lips like blowing through a straw, then transition to nasal breathing."},
      {id:"bird_dog",name:"Bird Dog",prescription:"3 × 8/side",sets:3,dw:"—",dr:"8",note:"Pairs with pec fly as active rest. Move slowly and deliberately. If you rush it, you lose the diaphragm connection entirely.",noStepW:true,breath:true,
        abbyNote:"Draw your ribs towards your hips before you extend. That's your core engaging — not your lower back taking over."},
    ]},
    {title:"Arm Superset 5A/5B",superset:true,exercises:[

// ── STATE ─────────────────────────────────────────────────────────────
let curSess='A',sessStart=null,qIdx=0;
let setData={},wuData={},cbData={},cbWarmup={},notes={},skipped={},renames={},sessionOrder={},customExs=[],checkinText='';
let history=[],lastW={},lastR={},lastSessData=null;

function load(){
  try{history=JSON.parse(localStorage.getItem('tlog_h')||'[]');}catch(e){}
  try{const x=localStorage.getItem('tlog_lw');if(x)lastW=JSON.parse(x);}catch(e){}
  try{const x=localStorage.getItem('tlog_lr');if(x)lastR=JSON.parse(x);}catch(e){}
}
function save(){
  try{localStorage.setItem('tlog_h',JSON.stringify(history.slice(0,60)));}catch(e){}
  try{localStorage.setItem('tlog_lw',JSON.stringify(lastW));}catch(e){}
  try{localStorage.setItem('tlog_lr',JSON.stringify(lastR));}catch(e){}
}
function getSeed(key,def){try{const v=localStorage.getItem('tlog_seed_'+key);return v!==null?parseFloat(v):def;}catch(e){return def;}}
function saveSeed(key,val){try{localStorage.setItem('tlog_seed_'+key,String(val));}catch(e){}}

// ── INIT ──────────────────────────────────────────────────────────────
function init(){
  load();
  document.getElementById('headerDate').textContent=
    new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  qIdx=Math.floor(Math.random()*QUOTES.length);
  renderQuote();updateHomeStats();initSessState('A');renderSessContent();
  setupLongPress();
}

function renderQuote(){
  const q=QUOTES[qIdx];
  document.getElementById('quoteText').textContent='\u201C'+q.t+'\u201D';
  document.getElementById('quoteAuthor').textContent=q.a;
}
function cycleQuote(){
  const el=document.getElementById('quoteText');el.style.opacity='0';
  setTimeout(()=>{qIdx=(qIdx+1)%QUOTES.length;renderQuote();el.style.opacity='1';},200);
}

// ── HOME ──────────────────────────────────────────────────────────────
function updateBenchTarget(){
  const manualBest=getSeed('benchBest',42.5);
  let histBest=0;
  history.forEach(h=>{
    if(!h.log)return;
    ['flat_bench','bench'].forEach(id=>{
      if(h.log[id]&&h.log[id].sets)
        h.log[id].sets.forEach(s=>{if(s.logged){const w=parseFloat(s.w)||0;if(w>histBest)histBest=w;}});
    });
  });
  const best=Math.max(manualBest,histBest);
  document.getElementById('btCurrent').textContent=best;
  document.getElementById('btBarFill').style.width=Math.min(100,Math.round((best/50)*100))+'%';
  document.getElementById('btBarL').textContent=best+' kg';
  document.getElementById('btSub').textContent=best>=50?'🎯 Target reached!':((50-best).toFixed(1))+' kg to go · 8 reps per set';
  const days=Math.ceil((new Date('2025-05-01')-new Date())/(864e5));
  document.getElementById('btDeadline').textContent=days>0?days+' days left':'May 2025';
}

function editBenchCurrent(){
  const span=document.getElementById('btCurrent');
  const cur=span.textContent;
  const inp=document.createElement('input');
  inp.type='number';inp.className='bt-current-inp';inp.value=cur;inp.step='0.5';inp.min='0';
  inp.onclick=e=>e.stopPropagation();
  inp.onblur=()=>{
    const v=parseFloat(inp.value);
    if(!isNaN(v)){saveSeed('benchBest',v);}
    span.style.display='';inp.replaceWith(span);updateBenchTarget();
  };
  inp.onkeydown=e=>{if(e.key==='Enter'||e.key==='Escape')inp.blur();};
  span.style.display='none';span.parentNode.insertBefore(inp,span);
  setTimeout(()=>{inp.focus();inp.select();},30);
}

function editGoalNum(type){
  const idMap={year:'yearSessions',month:'goalSessions'};
  const wrapMap={year:'yearNumWrap',month:'monthNumWrap'};
  const span=document.getElementById(idMap[type]);
  const cur=span.textContent;
  const inp=document.createElement('input');
  inp.type='number';inp.className='goal-num-inp';inp.value=cur;inp.min='0';inp.step='1';
  inp.onblur=()=>{
    const v=parseInt(inp.value);
    if(!isNaN(v)){
      const now=new Date();
      const dynCount=type==='year'
        ?history.filter(h=>new Date(h.date).getFullYear()===now.getFullYear()).length
        :history.filter(h=>{const d=new Date(h.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;
      saveSeed('seed_'+type,v-dynCount);
    }
    updateHomeStats();
  };
  inp.onkeydown=e=>{if(e.key==='Enter'||e.key==='Escape')inp.blur();};
  const wrap=document.getElementById(wrapMap[type]);
  wrap.innerHTML='';wrap.appendChild(inp);
  setTimeout(()=>{inp.focus();inp.select();},30);
}

function updateHomeStats(){
  updateBenchTarget();
  const now=new Date();
  const yearDyn=history.filter(h=>new Date(h.date).getFullYear()===now.getFullYear()).length;
  const monthDyn=history.filter(h=>{const d=new Date(h.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;
  const yearSeed=getSeed('seed_year',25);
  const monthSeed=getSeed('seed_month',2);
  const yearEl=document.getElementById('yearSessions');
  const monthEl=document.getElementById('goalSessions');
  if(yearEl){yearEl.textContent=yearSeed+yearDyn;}
  if(monthEl){monthEl.textContent=monthSeed+monthDyn;}
  if(history.length){
    const last=history[0],d=new Date(last.date);
    document.getElementById('lastBody').innerHTML=
      '<strong>'+last.label+'</strong><br>'+
      d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})+
      ' &nbsp;\u00b7&nbsp; '+last.done+'/'+last.total+' exercises'+
      ' &nbsp;\u00b7&nbsp; '+(last.duration||'—')+' min';
  }
}
function updateWeightGoal(){
  const v=parseFloat(document.getElementById('currentWeight').value)||null;
  const el=document.getElementById('weightGap');
  if(!v){el.textContent='';return;}
  const d=(75-v).toFixed(1);
  el.textContent=d>0?'+'+d+' kg to go':'✓ Reached';
}

// ── NAV ───────────────────────────────────────────────────────────────
function showPage(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');btn.classList.add('active');
  document.getElementById('finishBar').style.display=page==='session'?'flex':'none';
  if(page==='history')renderHistory();
  if(page==='home')updateHomeStats();
}

// ── SESSION STATE ─────────────────────────────────────────────────────
function initSessState(s){
  setData={};notes={};wuData={};cbData={};cbWarmup={};skipped={};renames={};sessionOrder={};customExs=[];checkinText='';
  const sess=SESSIONS[s];
  sess.groups.forEach(g=>g.exercises.forEach(ex=>{
    if(ex.type==='warmup'){const mv={};ex.metrics.forEach(m=>{mv[m.id]=m.val;});wuData[ex.id]={metrics:mv,done:false};}
    else if(ex.type==='checkbox'){cbData[ex.id]=false;}
    else{
      const dw=lastW[ex.id]!==undefined?lastW[ex.id]:ex.dw;
      const dr=lastR[ex.id]!==undefined?lastR[ex.id]:ex.dr;
      setData[ex.id]=Array.from({length:ex.sets},()=>({w:dw,r:dr,logged:false}));
      notes[ex.id]='';
      if(ex.warmupSet)cbWarmup[ex.id]=false;
    }
  }));
}
function selectSess(s,btn){
  curSess=s;sessStart=new Date();initSessState(s);
  document.querySelectorAll('.sess-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  renderSessContent();
}

function getLastSessSets(exId){
  const prev=history.find(h=>h.session===curSess);
  if(!prev||!prev.log||!prev.log[exId]||!prev.log[exId].sets)return null;
  return prev.log[exId].sets;
}
function getLastSessNote(exId){
  const prev=history.find(h=>h.session===curSess);
  if(!prev||!prev.log||!prev.log[exId])return'';
  return prev.log[exId].note||'';
}
function fmtSet(s){
  if(s.w&&s.w!=='—'&&s.w!=='BW'&&s.r&&s.r!=='—')return s.r+' / '+s.w+' kg';
  if(s.r&&s.r!=='—')return s.r+' reps';
  return'—';
}

// ── RENDER SESSION ────────────────────────────────────────────────────
function getOrderedGroups(){
  const sess=SESSIONS[curSess];
  return sess.groups.map((grp,gi)=>{
    const exOrder=sessionOrder[gi]||grp.exercises.map((_,i)=>i);
    return{...grp,exercises:exOrder.map(i=>grp.exercises[i])};
  });
}

function renderSessContent(){
  if(!sessStart)sessStart=new Date();
  const groups=getOrderedGroups();
  let html='';
  html+='<div class="checkin-card">'
    +'<div class="checkin-head"><div class="checkin-dot"></div><span class="checkin-title">Check-in</span><span class="checkin-hint">How are you feeling?</span></div>'
    +'<div class="checkin-body"><div class="checkin-prompts">Energy · Sleep · Hunger · Headache · Time of day</div>'
    +'<textarea class="checkin-area" id="checkinArea" placeholder="e.g. Tired, slept 6h, ate well, 17:30…" oninput="saveCheckin()">'+esc(checkinText)+'</textarea>'
    +'</div></div>';
  groups.forEach((grp,gi)=>{
    html+='<div class="block-sec"><div class="block-title">'+grp.title+'</div>';
    if(grp.superset){
      html+='<div class="superset-wrap"><div class="superset-tag">Superset — no rest between exercises</div>';
      grp.exercises.forEach(ex=>{html+=renderExAny(ex,gi);});
      html+='</div>';
    }else{grp.exercises.forEach(ex=>{html+=renderExAny(ex,gi);});}
    html+='</div>';
  });
  if(customExs.length){
    html+='<div class="block-sec"><div class="block-title">Additional Exercises</div>';
    customExs.forEach(cx=>{html+=renderCustomEx(cx);});
    html+='</div>';
  }
  html+='<button class="add-custom-btn" onclick="showCustomForm()"><span class="add-custom-plus">+</span> Add Custom Exercise</button>';
  html+='<div id="customFormArea"></div>';
  document.getElementById('sessContent').innerHTML=html;
}
function saveCheckin(){const el=document.getElementById('checkinArea');if(el)checkinText=el.value;}

function renderExAny(ex,gi){
  if(ex.type==='warmup')return renderWarmup(ex);
  if(ex.type==='checkbox')return renderCheckbox(ex);
  return renderEx(ex,gi);
}

function renderWarmup(ex){
  const d=wuData[ex.id]||{metrics:{},done:false};
  let mHtml='';
  ex.metrics.forEach(m=>{
    const v=d.metrics[m.id]!==undefined?d.metrics[m.id]:m.val;
    mHtml+='<div class="warmup-metric"><div class="warmup-metric-lbl">'+m.label+'</div>'
      +'<div class="warmup-stepper">'
      +'<button class="warmup-step-btn" onclick="adjWu(\''+ex.id+'\',\''+m.id+'\',-1,'+m.step+','+m.min+','+m.max+',event)">−</button>'
      +'<span class="warmup-step-val" id="wuv_'+ex.id+'_'+m.id+'">'+v+'</span>'
      +'<button class="warmup-step-btn" onclick="adjWu(\''+ex.id+'\',\''+m.id+'\',1,'+m.step+','+m.min+','+m.max+',event)">+</button>'
      +'</div><div class="warmup-metric-unit">'+m.unit+'</div></div>';
  });
  const ts=d.done?'background:var(--gold);border-color:var(--gold);color:#0a0f18;font-weight:700':'';
  const tick='<div class="ex-tick" style="'+ts+'">'+(d.done?'✓':'')+'</div>';
  return '<div class="warmup-card'+(d.done?' done':'')+'" id="wu_'+ex.id+'">'
    +'<div class="warmup-head">'+tick+'<div class="warmup-title">'+ex.name+'</div></div>'
    +'<div class="warmup-body"><div class="warmup-metrics">'+mHtml+'</div>'
    +'<button class="warmup-done-btn'+(d.done?' done-state':'')+'" onclick="toggleWu(\''+ex.id+'\')">'+(d.done?'✓ Done':'Mark Done')+'</button>'
    +'</div></div>';
}

function renderCheckbox(ex){
  const checked=cbData[ex.id]||false;
  const breathTag=ex.breath?'<span class="ex-tag-breath" style="margin-left:8px">Breath</span>':'';
  return '<div class="checkbox-row'+(checked?' checked':'')+'" onclick="toggleCb(\''+ex.id+'\')" id="cb_'+ex.id+'">'
    +'<div class="cb-box">'+(checked?'✓':'')+'</div>'
    +'<div class="cb-label">'+ex.name+breathTag+'</div>'
    +'</div>';
}

function renderEx(ex,gi){
  const sd=setData[ex.id]||[];
  const isSkipped=!!skipped[ex.id];
  const done=!isSkipped&&sd.length>0&&sd.every(s=>s.logged);
  const loggedCount=sd.filter(s=>s.logged).length;
  const displayName=renames[ex.id]||ex.name;
  const isRenamed=!!renames[ex.id];

  let summaryHtml='';
  if(isSkipped)summaryHtml='<span style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);background:rgba(90,116,148,0.12);border:1px solid var(--skipped-border);padding:2px 8px;border-radius:10px">Skipped</span>';
  else if(loggedCount>0)summaryHtml='<div class="ex-summary">'+loggedCount+'/'+ex.sets+'</div>';

  const lastSets=getLastSessSets(ex.id);
  let lastSetsHtml='';
  if(lastSets&&lastSets.length){
    const chips=lastSets.map((s,i)=>'<div class="last-set-chip">S'+(i+1)+': '+(s.logged?fmtSet(s):'—')+'</div>').join('');
    lastSetsHtml='<div class="last-sets-block"><div class="last-sets-title">Last session</div><div class="last-sets-row">'+chips+'</div></div>';
  }
  const lastNote=getLastSessNote(ex.id);
  const lastNoteHtml=lastNote?'<div class="last-note-block">Last session note: '+esc(lastNote)+'</div>':'';

  let warmupSetHtml='';
  if(ex.warmupSet){
    const wuChecked=cbWarmup[ex.id]||false;
    warmupSetHtml='<div class="warmup-set-row">'
      +'<div class="cb-box" style="border-radius:3px;cursor:pointer;flex-shrink:0;'+(wuChecked?'background:var(--gold);border-color:var(--gold);color:#0a0f18;font-weight:700':'')+'" onclick="toggleWarmupSet(\''+ex.id+'\')">'+(wuChecked?'✓':'')+'</div>'
      +'<span class="warmup-set-lbl">Warm-up set</span>'
      +'<span class="warmup-set-weight">20 kg — barbell only</span>'
      +'</div>';
  }

  let abbyHtml='';
  if(ex.abbyNote){
    abbyHtml='<div class="abby-note"><strong>Abby</strong>'+esc(ex.abbyNote)+'</div>';
  }

  let setsHtml='<div class="sets-title">Working sets</div><div class="sets-list">';
  sd.forEach((s,i)=>{setsHtml+=renderSetRow(ex,i,s);});
  setsHtml+='</div>';

  const curNote=notes[ex.id]||'';
  const noteHtml='<div class="note-lbl">Notes</div><textarea class="note-area" id="note_'+ex.id+'" placeholder="Add a note…" oninput="saveNote(\''+ex.id+'\')">'+esc(curNote)+'</textarea>';
  const coachHtml=ex.note?'<div class="coach-note">'+ex.note+'</div>':'';

  let tags='';
  if(ex.rehab)tags+='<span class="ex-tag-rehab">Rehab</span>';
  if(ex.breath)tags+='<span class="ex-tag-breath">Breath</span>';

  const skipToggle='<button class="skip-toggle" onclick="toggleSkip(\''+ex.id+'\',event)">'+(isSkipped?'↩':'Skip')+'</button>';

  let cardClass='ex-card';
  if(done)cardClass+=' done';
  if(isSkipped)cardClass+=' skipped';

  const nameHtml='<span class="ex-name'+(isRenamed?' ex-name-renamed':'')+'" id="exname_'+ex.id+'">'+esc(displayName)+'</span>';

  return '<div class="'+cardClass+'" id="ec_'+ex.id+'">'
    +'<div class="ex-head">'
    +'<div class="ex-tick" onclick="'+(isSkipped?'toggleSkip(\''+ex.id+'\',event)':'toggleExHead(\''+ex.id+'\')')+'">'+( done?'✓':isSkipped?'✕':'')+'</div>'
    +'<div class="ex-meta" onclick="toggleExHead(\''+ex.id+'\')">'
    +nameHtml+(ex.prescription?'<div class="ex-presc">'+ex.prescription+'</div>':'')+'</div>'
    +(tags?'<div class="ex-tags">'+tags+'</div>':'')
    +summaryHtml
    +skipToggle
    +'</div>'
    +(isSkipped?'':'<div class="ex-body">'+lastSetsHtml+lastNoteHtml+warmupSetHtml+abbyHtml+setsHtml+noteHtml+coachHtml+'</div>')
    +'</div>';
}

function renderSetRow(ex,i,s){
  const canW=!ex.noStep&&!ex.noStepW&&s.w!=='—'&&s.w!=='BW';
  const canR=!ex.noStep&&s.r!=='—';
  const rCtrl=canR
    ?'<div class="set-step-group"><button class="set-step-btn" onclick="adjSet(\''+ex.id+'\','+i+',\'r\',-1,event)">−</button><span class="set-step-val" id="sv_r_'+ex.id+'_'+i+'" onclick="openInlineEdit(\'sv_r_'+ex.id+'_'+i+'\',\'r\',event)">'+s.r+'</span><button class="set-step-btn" onclick="adjSet(\''+ex.id+'\','+i+',\'r\',1,event)">+</button></div><span class="set-step-unit">reps</span>'
    :'<span style="font-size:13px;color:var(--muted);padding:0 5px">'+s.r+'</span>';
  const wCtrl=canW
    ?'<div class="set-step-group"><button class="set-step-btn" onclick="adjSet(\''+ex.id+'\','+i+',\'w\',-1,event)">−</button><span class="set-step-val" id="sv_w_'+ex.id+'_'+i+'" onclick="openInlineEdit(\'sv_w_'+ex.id+'_'+i+'\',\'w\',event)">'+s.w+'</span><button class="set-step-btn" onclick="adjSet(\''+ex.id+'\','+i+',\'w\',1,event)">+</button></div><span class="set-step-unit">kg</span>'
    :'<span style="font-size:13px;color:var(--muted);padding:0 5px">'+s.w+'</span>';
  const logBtn=s.logged
    ?'<button class="set-log-btn" onclick="unlogSet(\''+ex.id+'\','+i+',event)">✓</button>'
    :'<button class="set-log-btn" onclick="logSet(\''+ex.id+'\','+i+',event)">Log</button>';
  return '<div class="set-row'+(s.logged?' set-logged':'')+'" id="sr_'+ex.id+'_'+i+'">'
    +'<span class="set-num">S'+(i+1)+'</span>'
    +'<div class="set-stepper">'+rCtrl+'<span class="set-sep">/</span>'+wCtrl+'</div>'
    +logBtn+'</div>';
}

// ── INLINE EDIT ───────────────────────────────────────────────────────
function openInlineEdit(spanId,type,e){
  e.stopPropagation();
  const span=document.getElementById(spanId);if(!span)return;
  const cur=span.textContent;
  const inp=document.createElement('input');
  inp.type='number';inp.className='set-step-inp';inp.value=cur;inp.step=type==='w'?'0.5':'1';inp.min='0';
  inp.onclick=ev=>ev.stopPropagation();
  inp.onblur=()=>{
    const v=parseFloat(inp.value);
    span.textContent=isNaN(v)?cur:(Number.isInteger(v)?String(v):v.toFixed(1));
    span.style.display='';inp.replaceWith(span);
  };
  inp.onkeydown=ev=>{if(ev.key==='Enter'||ev.key==='Escape')inp.blur();};
  span.style.display='none';span.parentNode.insertBefore(inp,span);
  setTimeout(()=>{inp.focus();inp.select();},30);
}

// ── EXERCISE INTERACTIONS ─────────────────────────────────────────────
function adjWu(exId,mId,dir,step,min,max,e){
  e.stopPropagation();const d=wuData[exId];if(!d)return;
  let v=parseFloat(d.metrics[mId])||0;
  v=Math.max(min,Math.min(max,v+dir*step));
  d.metrics[mId]=String(Math.round(v));
  const el=document.getElementById('wuv_'+exId+'_'+mId);if(el)el.textContent=d.metrics[mId];
}
function toggleWu(exId){
  const d=wuData[exId];if(!d)return;d.done=!d.done;
  const card=document.getElementById('wu_'+exId);if(!card)return;
  const ex=findEx(exId);if(!ex)return;
  const tmp=document.createElement('div');tmp.innerHTML=renderWarmup(ex);card.replaceWith(tmp.firstElementChild);
}
function toggleCb(exId){
  cbData[exId]=!cbData[exId];
  const el=document.getElementById('cb_'+exId);if(!el)return;
  const ex=findEx(exId);if(!ex)return;
  const tmp=document.createElement('div');tmp.innerHTML=renderCheckbox(ex);el.replaceWith(tmp.firstElementChild);
}
function toggleWarmupSet(exId){cbWarmup[exId]=!cbWarmup[exId];refreshEx(exId);}
function toggleSkip(exId,e){e.stopPropagation();skipped[exId]=!skipped[exId];refreshEx(exId);}
function adjSet(exId,i,type,dir,e){
  e.stopPropagation();if(!setData[exId])return;
  const s=setData[exId][i];const ex=findEx(exId);if(!ex)return;
  if(type==='w'){
    let v=parseFloat(s.w)||0;v=Math.max(0,v+dir);
    s.w=Number.isInteger(v)?String(v):v.toFixed(1);
    const el=document.getElementById('sv_w_'+exId+'_'+i);if(el)el.textContent=s.w;
  }else{
    let v=parseInt(s.r)||0;v=Math.max(0,v+dir);s.r=String(v);
    const el=document.getElementById('sv_r_'+exId+'_'+i);if(el)el.textContent=s.r;
  }
}
function logSet(exId,i,e){
  e.stopPropagation();if(!setData[exId])return;
  const wEl=document.getElementById('sv_w_'+exId+'_'+i);
  const rEl=document.getElementById('sv_r_'+exId+'_'+i);
  if(wEl)setData[exId][i].w=wEl.textContent;if(rEl)setData[exId][i].r=rEl.textContent;
  setData[exId][i].logged=true;
  const s=setData[exId][i];
  for(let j=i+1;j<setData[exId].length;j++){if(!setData[exId][j].logged){setData[exId][j].w=s.w;setData[exId][j].r=s.r;}}
  lastW[exId]=s.w;lastR[exId]=s.r;save();refreshEx(exId);
}
function unlogSet(exId,i,e){
  e.stopPropagation();if(!setData[exId])return;
  setData[exId][i].logged=false;refreshEx(exId);
}
function toggleExHead(id){
  if(skipped[id])return;
  const done=setData[id]&&setData[id].every(s=>s.logged);
  const ex=findEx(id);if(!ex)return;
  if(done){setData[id].forEach(s=>s.logged=false);}
  else{setData[id].forEach(s=>s.logged=true);const f=setData[id][0];lastW[id]=f.w;lastR[id]=f.r;save();}
  refreshEx(id);
}
function refreshEx(exId){
  const ex=findEx(exId);if(!ex)return;
  const card=document.getElementById('ec_'+exId);if(!card)return;
  const tmp=document.createElement('div');tmp.innerHTML=renderEx(ex);
  const newCard=tmp.firstElementChild;card.replaceWith(newCard);
  const noteEl=newCard.querySelector('.note-area');
  if(noteEl&&notes[exId])noteEl.value=notes[exId];
}
function saveNote(id){const el=document.getElementById('note_'+id);if(el)notes[id]=el.value;}
function findEx(id){
  let found=null;
  Object.values(SESSIONS).forEach(sess=>sess.groups.forEach(g=>g.exercises.forEach(ex=>{if(ex.id===id)found=ex;})));
  return found;
}

// ── LONG PRESS (rename/reorder) ───────────────────────────────────────
let longPressTimer=null,ctxTarget=null,lpStartX=0,lpStartY=0,lpMoved=false;
function setupLongPress(){
  document.addEventListener('touchstart',onTS,{passive:true});
  document.addEventListener('touchend',onTE,{passive:true});
  document.addEventListener('touchmove',onTM,{passive:true});
  document.addEventListener('mousedown',onMD);
  document.addEventListener('mouseup',onMU);
}
function onTS(e){lpStartX=e.touches[0].clientX;lpStartY=e.touches[0].clientY;lpMoved=false;startLP(e.touches[0].clientX,e.touches[0].clientY,e.target);}
function onTM(e){const dx=e.touches[0].clientX-lpStartX,dy=e.touches[0].clientY-lpStartY;if(Math.abs(dx)>8||Math.abs(dy)>8){lpMoved=true;cancelLP();}}
function onTE(){cancelLP();}
function onMD(e){if(e.button===0)startLP(e.clientX,e.clientY,e.target);}
function onMU(){cancelLP();}
function startLP(x,y,target){
  cancelLP();
  const exCard=target.closest('.ex-card[id^="ec_"]');
  if(!exCard)return;
  longPressTimer=setTimeout(()=>{
    if(lpMoved)return;
    const exId=exCard.id.replace('ec_','');
    const ex=findEx(exId);if(!ex)return;
    ctxTarget={exId,x,y};showCtxMenu(ex,exId,x,y);
  },500);
}
function cancelLP(){if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}}
function showCtxMenu(ex,exId,x,y){
  const menu=document.getElementById('ctxMenu');
  const overlay=document.getElementById('ctxOverlay');
  const grpInfo=getExGroupInfo(exId);
  let items='<div class="ctx-item" onclick="ctxRename()">✎ Rename (this session)</div>';
  items+='<div class="ctx-sep"></div>';
  if(grpInfo){
    if(grpInfo.posInGroup>0)items+='<div class="ctx-item" onclick="ctxMove(-1)">↑ Move Up</div>';
    if(grpInfo.posInGroup<grpInfo.groupSize-1)items+='<div class="ctx-item" onclick="ctxMove(1)">↓ Move Down</div>';
  }
  menu.innerHTML=items;
  overlay.style.display='block';
  const menuW=190,menuH=menu.children.length*42;
  menu.style.left=Math.min(x,window.innerWidth-menuW-12)+'px';
  menu.style.top=Math.min(y,window.innerHeight-menuH-12)+'px';
  menu.style.display='block';
}
function closeCtx(){document.getElementById('ctxMenu').style.display='none';document.getElementById('ctxOverlay').style.display='none';ctxTarget=null;}
function ctxRename(){
  if(!ctxTarget)return;
  const{exId}=ctxTarget;closeCtx();
  const nameEl=document.getElementById('exname_'+exId);if(!nameEl)return;
  const current=renames[exId]||findEx(exId).name;
  nameEl.innerHTML='<input class="rename-input" id="ri_'+exId+'" value="'+esc(current)+'" onclick="event.stopPropagation()" onkeydown="renameKey(event,\''+exId+'\')">';
  setTimeout(()=>{const inp=document.getElementById('ri_'+exId);if(inp){inp.focus();inp.select();}},50);
}
function renameKey(e,exId){if(e.key==='Enter')commitRename(exId);if(e.key==='Escape'){renames[exId]=null;refreshEx(exId);}}
function commitRename(exId){
  const inp=document.getElementById('ri_'+exId);if(!inp)return;
  const val=inp.value.trim();
  renames[exId]=val&&val!==findEx(exId).name?val:null;
  refreshEx(exId);
}
function getExGroupInfo(exId){
  const sess=SESSIONS[curSess];
  for(let gi=0;gi<sess.groups.length;gi++){
    const grp=sess.groups[gi];
    const order=sessionOrder[gi]||grp.exercises.map((_,i)=>i);
    const pos=order.findIndex(oi=>grp.exercises[oi].id===exId);
    if(pos>=0)return{gi,pos,posInGroup:pos,groupSize:order.length};
  }
  return null;
}
function ctxMove(dir){
  if(!ctxTarget)return;
  const info=getExGroupInfo(ctxTarget.exId);if(!info)return;
  const{gi,pos}=info;const grp=SESSIONS[curSess].groups[gi];
  if(!sessionOrder[gi])sessionOrder[gi]=grp.exercises.map((_,i)=>i);
  const order=sessionOrder[gi];const newPos=pos+dir;
  if(newPos<0||newPos>=order.length)return;
  [order[pos],order[newPos]]=[order[newPos],order[pos]];
  closeCtx();renderSessContent();
}

function adjCustomSet(cxId,i,type,dir,e){e.stopPropagation();const cx=customExs.find(c=>c.id===cxId);if(!cx||!cx.sets[i])return;if(type==='w'){let v=parseFloat(cx.sets[i].w)||0;v=Math.max(0,v+dir);cx.sets[i].w=Number.isInteger(v)?String(v):v.toFixed(1);}else{let v=parseInt(cx.sets[i].r)||0;v=Math.max(0,v+dir);cx.sets[i].r=String(v);}const el=document.getElementById(type==='w'?'csv_w_'+cxId+'_'+i:'csv_r_'+cxId+'_'+i);if(el)el.textContent=type==='w'?cx.sets[i].w:cx.sets[i].r;}
function logCustomSet(cxId,i,e){e.stopPropagation();const cx=customExs.find(c=>c.id===cxId);if(!cx||!cx.sets[i])return;const wEl=document.getElementById('csv_w_'+cxId+'_'+i);const rEl=document.getElementById('csv_r_'+cxId+'_'+i);if(wEl)cx.sets[i].w=wEl.textContent;if(rEl)cx.sets[i].r=rEl.textContent;cx.sets[i].logged=true;for(let j=i+1;j<cx.sets.length;j++){if(!cx.sets[j].logged){cx.sets[j].w=cx.sets[i].w;cx.sets[j].r=cx.sets[i].r;}}renderSessContent();}
function unlogCustomSet(cxId,i,e){e.stopPropagation();const cx=customExs.find(c=>c.id===cxId);if(!cx||!cx.sets[i])return;cx.sets[i].logged=false;renderSessContent();}

// ── FINISH ────────────────────────────────────────────────────────────
function confirmFinish(){
  const sess=SESSIONS[curSess];let total=0,logged=0;
  sess.groups.forEach(g=>g.exercises.forEach(ex=>{
    if(ex.type==='warmup'||ex.type==='checkbox')return;
    total++;const sd=setData[ex.id]||[];
    if(sd.length>0&&sd.every(s=>s.logged))logged++;
  }));
  const pct=total>0?Math.round((logged/total)*100):0;
  document.getElementById('confirmSummary').textContent=logged+' of '+total+' exercises completed ('+pct+'%)';
  document.getElementById('confirmModal').classList.add('show');
}
function closeConfirm(){document.getElementById('confirmModal').classList.remove('show');}

function doFinish(){
  closeConfirm();
  const sess=SESSIONS[curSess];let total=0,done=0;const log={};
  sess.groups.forEach(g=>g.exercises.forEach(ex=>{
    if(ex.type==='warmup'){total++;if((wuData[ex.id]||{}).done)done++;log[ex.id]={type:'warmup',metrics:{...(wuData[ex.id]||{}).metrics},done:(wuData[ex.id]||{}).done,name:ex.name};}
    else if(ex.type==='checkbox'){total++;if(cbData[ex.id])done++;log[ex.id]={type:'checkbox',done:cbData[ex.id]||false,name:ex.name};}
    else{total++;const sd=setData[ex.id]||[];const exDone=!skipped[ex.id]&&sd.length>0&&sd.every(s=>s.logged);if(exDone)done++;
      log[ex.id]={sets:sd.map(s=>({...s})),note:notes[ex.id]||'',name:ex.name,displayName:renames[ex.id]||ex.name,skipped:!!skipped[ex.id],warmupSetDone:cbWarmup[ex.id]||false};}
  }));
  customExs.forEach(cx=>{total++;const exDone=cx.sets.length>0&&cx.sets.every(s=>s.logged);if(exDone)done++;log[cx.id]={sets:cx.sets.map(s=>({...s})),note:cx.note||'',customName:cx.name,isCustom:true,metricType:cx.metricType};});
  const mins=sessStart?Math.round((new Date()-sessStart)/60000):0;
  const now=new Date();
  const yearDyn=history.filter(h=>new Date(h.date).getFullYear()===now.getFullYear()).length;
  const sessNumber=getSeed('seed_year',25)+yearDyn+1;
  const entry={date:now.toISOString(),session:curSess,label:sess.label,sub:sess.sub,done,total,duration:mins,checkin:checkinText,log,sessNumber};
  history.unshift(entry);lastSessData=entry;save();
  const q=QUOTES[Math.floor(Math.random()*QUOTES.length)];
  document.getElementById('modalEye').textContent=now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).toUpperCase();
  document.getElementById('modalStats').innerHTML='<div class="modal-stat"><div class="modal-stat-val">'+done+'/'+total+'</div><div class="modal-stat-lbl">Exercises</div></div><div class="modal-stat"><div class="modal-stat-val">'+(mins||'—')+'</div><div class="modal-stat-lbl">Minutes</div></div>';
  document.getElementById('modalQt').textContent='\u201C'+q.t+'\u201D';
  document.getElementById('modalQa').textContent=q.a;
  const btn=document.getElementById('copyBtn');if(btn){btn.classList.remove('copied');btn.innerHTML='<span>⎘</span> Copy Session Summary';}
  document.getElementById('modal').classList.add('show');
}

function resumeSession(){
  history.shift();lastSessData=null;
  try{localStorage.setItem('tlog_h',JSON.stringify(history.slice(0,60)));}catch(e){}
  document.getElementById('modal').classList.remove('show');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-session').classList.add('active');
  document.querySelectorAll('.nav-btn')[1].classList.add('active');
  document.getElementById('finishBar').style.display='flex';
}
function closeModal(){
  document.getElementById('modal').classList.remove('show');
  sessStart=new Date();initSessState(curSess);renderSessContent();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-home').classList.add('active');
  document.querySelector('.nav-btn').classList.add('active');
